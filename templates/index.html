<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HdRezka DB Filter</title>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("hdrezka-theme");
        if (theme === "dark" || theme === "light") {
          document.documentElement.dataset.theme = theme;
        }
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css?v=6">
</head>
<body>
  <main>
    <header class="topbar">
      <h1>HdRezka DB Filter</h1>
      <label class="theme-switch" title="Переключить тему">
        <span>Тема</span>
        <input id="themeToggle" type="checkbox" role="switch" aria-label="Темная тема">
        <span class="theme-slider" aria-hidden="true"></span>
      </label>
    </header>

    <form class="toolbar" id="searchForm">
      <label>
        Пользователь
        <select id="userSelect" name="user_id" required>
          <option value="">Загрузка...</option>
        </select>
      </label>

      <label class="wide">
        Поиск
        <input id="query" name="query" placeholder="Например: фантастика или детектив" autocomplete="off">
      </label>

      <label>
        Тип
        <select id="contentType" name="content_type">
          <option value="all">Любой</option>
          <option value="film">Фильм</option>
          <option value="series">Сериал</option>
          <option value="cartoon">Мультфильм</option>
          <option value="anime">Аниме</option>
        </select>
      </label>

      <label>
        Жанры
        <input id="includeGenres" name="include_genres" placeholder="фантастика, детектив">
      </label>

      <label>
        Страны
        <input id="includeCountries" name="include_countries" placeholder="США, Великобритания">
      </label>

      <label>
        Бан жанров
        <input id="banGenres" name="ban_genres" placeholder="аниме, ужасы">
      </label>

      <label>
        Бан стран
        <input id="banCountries" name="ban_countries" placeholder="Россия, Индия">
      </label>

      <label>
        IMDb от
        <input id="minImdb" name="min_imdb" type="number" min="0" max="10" step="0.1" placeholder="5.0">
      </label>

      <label>
        IMDb до
        <input id="maxImdb" name="max_imdb" type="number" min="0" max="10" step="0.1" placeholder="8.0">
      </label>

      <label>
        Лимит
        <input id="limit" name="limit" type="number" min="1" max="300" value="100">
      </label>

      <label>
        Сортировка
        <select id="sortMode" name="sort_mode">
          <option value="desc">От высокой</option>
          <option value="asc">От низкой</option>
          <option value="title">По названию</option>
          <option value="random">Случайно</option>
        </select>
      </label>

      <label>
        Источник дозагрузки
        <select id="crawlSource" name="crawl_source">
          <option value="auto">Авто</option>
          <option value="new">Новинки</option>
          <option value="popular">Популярное по фильтрам</option>
        </select>
      </label>

      <fieldset class="view-mode">
        <legend>Вид</legend>
        <label>
          <input type="radio" name="view_mode" value="cards" checked>
          Карточки
        </label>
        <label>
          <input type="radio" name="view_mode" value="text">
          Текст
        </label>
      </fieldset>

      <label class="checkbox-label">
        <input id="excludeSeen" name="exclude_seen" type="checkbox" value="1" checked>
        Не повторять показанные
      </label>

      <label class="checkbox-label">
        <input id="debug" name="debug" type="checkbox" value="1">
        Debug в терминал
      </label>

      <button id="submitBtn" type="submit">Искать</button>
      <button class="secondary" id="crawlBtn" type="button">Загрузить еще</button>
    </form>

    <div id="status" class="status"></div>
    <section id="results" class="results cards"></section>
  </main>

  <script src="/static/app.js?v=6"></script>
</body>
</html>
