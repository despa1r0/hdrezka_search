<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HdRezka фильтр</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main>
    <header class="topbar">
      <h1>HdRezka фильтр</h1>
      <button class="secondary" id="stopBtn" type="button">Остановить сервер</button>
    </header>

    <form class="toolbar" id="searchForm">
      <label class="wide">
        Поиск
        <input id="query" name="q" placeholder="Например: фантастика или детектив" required autocomplete="off">
      </label>

      <label>
        Жанры
        <input id="includeGenres" name="include_genres" placeholder="фантастика, детектив">
      </label>

      <label>
        Страны
        <input id="includeCountries" name="include_countries" placeholder="США, Великобритания">
      </label>

      <label>
        Бан жанров
        <input id="banGenres" name="ban_genres" placeholder="аниме, ужасы">
      </label>

      <label>
        Бан стран
        <input id="banCountries" name="ban_countries" placeholder="Россия, Индия">
      </label>

      <label>
        Максимум
        <input id="maxResults" name="max_results" type="number" min="1" max="300" value="100">
      </label>

      <label>
        IMDb от
        <input id="minRating" name="min_rating" type="number" min="0" max="10" step="0.1" placeholder="7.0">
      </label>

      <fieldset class="view-mode">
        <legend>Вид</legend>
        <label>
          <input type="radio" name="view_mode" value="cards" checked>
          Карточки
        </label>
        <label>
          <input type="radio" name="view_mode" value="text">
          Текст
        </label>
      </fieldset>

      <button id="submitBtn" type="submit">Искать</button>
    </form>

    <div id="status" class="status"></div>
    <section id="results" class="results cards"></section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
